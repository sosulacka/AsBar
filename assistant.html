<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AsBar — AI</title>
    <script type="module" src="/src/assistant.ts"></script>
  </head>
  <body>
    <div class="panel" id="panel">
      <!-- The whole header is a drag handle. Buttons/inputs are interactive so
           Tauri excludes them; dropdown options use pointerdown + are below it. -->
      <header class="bar" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <span class="dot"></span>
          <span class="logo" data-tauri-drag-region>AsBar AI</span>
        </div>

        <div class="actions">
          <div class="model" id="model">
            <button class="model-btn" id="model-btn" type="button">
              <span class="pdot" id="model-dot"></span>
              <span id="model-label">Gemini 2.5 Flash</span>
              <svg class="chev" viewBox="0 0 24 24" width="12" height="12"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
            </button>
            <div class="model-menu" id="model-menu"></div>
          </div>

          <button id="new-chat" class="icon-btn" type="button" data-i18n-title="assistant.newChat" data-i18n-aria="assistant.newChat" title="Новый чат" aria-label="Новый чат">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
          </button>
          <button id="close" class="icon-btn" type="button" data-i18n-title="assistant.close" data-i18n-aria="assistant.close" title="Закрыть" aria-label="Закрыть">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.3 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/></svg>
          </button>
        </div>
      </header>

      <div id="thread" class="thread">
        <div class="empty" id="empty">
          <div class="empty-glyph">✦</div>
          <p data-i18n="assistant.ask">Спросите что угодно</p>
          <span data-i18n="assistant.hint">AsBar AI · Ctrl + Space</span>
        </div>
      </div>

      <form id="composer" class="composer">
        <textarea id="input" rows="1" data-i18n-ph="assistant.placeholder" placeholder="Сообщение…" autocomplete="off" spellcheck="false"></textarea>
        <button id="send" type="submit" aria-label="Отправить">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3.4 20.4 21 12 3.4 3.6 3 10l12 2-12 2z"/></svg>
        </button>
      </form>
    </div>
  </body>
</html>
