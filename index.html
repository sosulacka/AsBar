<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AsBar</title>
    <script type="module" src="/src/island.ts"></script>
  </head>
  <body>
    <div class="stage">
      <div id="island" class="island idle">
        <!-- Clipped background layer (rounded); content sits above it. -->
        <div class="island-bg">
          <div class="glow"><img id="glow-img" alt="" /></div>
          <div class="scrim"></div>
        </div>
        <!-- Custom themed tooltip (replaces the native WebView title bubble) -->
        <div id="tip" class="tip"></div>

        <div class="content">
          <!-- Album artwork -->
          <div class="art">
            <img id="art-img" alt="" />
            <div class="art-fallback">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
              </svg>
            </div>
          </div>

          <!-- Info -->
          <div class="info">
            <div class="info-top">
              <span id="source-badge" class="source-badge">
                <span class="source-ic" id="source-ic"></span>
                <span id="source-name">AsBar</span>
              </span>
              <span class="status-dot" id="status-dot"></span>
              <!-- Standalone equalizer in the free space -->
              <span class="eq" id="eq"><span></span><span></span><span></span><span></span><span></span></span>
            </div>
            <div class="title-wrap"><div id="title" class="title"><span class="seg"></span></div></div>
            <div id="subtitle" class="subtitle" data-i18n="island.waiting">Ожидание плеера…</div>
          </div>

          <!-- Controls -->
          <div class="controls">
            <button id="prev" class="ctl" aria-label="Назад">
              <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M7 6v12a1 1 0 0 0 2 0v-4.5l8.5 5.27A1 1 0 0 0 19 18V6a1 1 0 0 0-1.5-.87L9 10.5V6a1 1 0 0 0-2 0z"/></svg>
            </button>
            <button id="toggle" class="ctl primary" aria-label="Пауза / Воспроизведение">
              <svg class="ic-play" viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.53.85l10.79-6.86a1 1 0 0 0 0-1.7L9.53 4.29A1 1 0 0 0 8 5.14z"/></svg>
              <svg class="ic-pause" viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M8 5a1.5 1.5 0 0 0-1.5 1.5v11a1.5 1.5 0 0 0 3 0v-11A1.5 1.5 0 0 0 8 5zm8 0a1.5 1.5 0 0 0-1.5 1.5v11a1.5 1.5 0 0 0 3 0v-11A1.5 1.5 0 0 0 16 5z"/></svg>
            </button>
            <button id="next" class="ctl" aria-label="Вперёд">
              <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M17 6v12a1 1 0 0 1-2 0v-4.5l-8.5 5.27A1 1 0 0 1 5 18V6a1 1 0 0 1 1.5-.87L15 10.5V6a1 1 0 0 1 2 0z"/></svg>
            </button>
          </div>
        </div>

        <!-- Seek -->
        <div id="seek" class="progress" role="slider" aria-label="Перемотка">
          <div class="progress-track"></div>
          <div id="progress-fill" class="progress-fill"></div>
          <div id="progress-knob" class="progress-knob"></div>
        </div>
      </div>
    </div>
  </body>
</html>
